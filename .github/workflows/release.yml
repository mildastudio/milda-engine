name: Publish

# Publishes the @mildastudio/* packages to npm. Trigger by publishing a GitHub
# Release, or manually. Requires the NPM_TOKEN secret.
#
# ORDER: `milda` must already be published (from milda-lang) — these packages
# depend on it, so `npm install` resolves it from the registry. Until then this
# workflow (and CI) will fail at install; that is expected before the first
# milda-lang publish.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build
      - run: npm publish -w @mildastudio/core -w @mildastudio/contract -w @mildastudio/generate -w @mildastudio/release --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
